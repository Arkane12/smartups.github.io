<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Smart UPS Dashboard</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: #2a2a2a;
      --border-light: #333333;
      --text-primary: #e8e8e8;
      --text-secondary: #888888;
      --text-muted: #444444;
      --accent: #00bcd4;
      --online: #3a3a3a;
      --battery: #2a1a1a;
      --battery-border: #5a2a2a;
      --online-border: #3a5a3a;
      --value-color: #ffffff;
      --time-color: #aaaaaa;
    }

    html, body {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* justify-content: center тут не використовується — при переповненні верх обрізається */
      justify-content: flex-start;
      overflow-y: auto;
      padding: max(56px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }

    /* ── Lang switcher ── */
    .lang-switcher {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: 14px;
      display: flex;
      gap: 2px;
      z-index: 100;
    }
    .lang-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68em;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 5px 9px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
      width: auto;
      margin: 0;
      /* на iOS кнопки без border-radius виглядають краще у switcher */
    }
    .lang-btn:first-child { border-radius: 3px 0 0 3px; }
    .lang-btn:last-child  { border-radius: 0 3px 3px 0; }
    .lang-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }
    .lang-btn:hover:not(.active) { border-color: var(--text-secondary); color: var(--text-secondary); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px 28px 24px;
      width: 100%;
      max-width: 420px;
    }

    /* ── Login ── */
    #loginScreen { text-align: center; }
    #loginScreen h2 {
      margin-bottom: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1em;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }
    .pin-input {
      width: 100%;
      padding: 14px;
      font-size: 1.6em;
      text-align: center;
      letter-spacing: 0.25em;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px;
      outline: none;
      margin-bottom: 16px;
      font-family: 'IBM Plex Mono', monospace;
      /* збільшений тач-таргет */
      -webkit-appearance: none;
    }
    .pin-input:focus { border-color: var(--accent); }

    /* ── Dashboard ── */
    #mainDashboard { display: none; }

    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.05em;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .header-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .dot-online  { background: #5a8a5a; box-shadow: 0 0 6px #5a8a5a88; }
    .dot-battery { background: #8a3a3a; box-shadow: 0 0 6px #8a3a3a88; }
    .dot-offline { background: #555555; }

    .status-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7em;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 12px;
      border-radius: 3px;
      margin-bottom: 22px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: var(--surface-2);
      text-align: center;
      transition: all 0.3s;
    }
    .status-badge.online  { background: var(--online);  border-color: var(--online-border);  color: #8aba8a; }
    .status-badge.battery { background: var(--battery); border-color: var(--battery-border); color: #ba6a6a; }

    .data-row { margin: 0 0 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .data-row:last-of-type { border-bottom: none; margin-bottom: 0; }
    .data-label {
      font-size: 0.7em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 5px;
    }
    .value      { font-family: 'IBM Plex Mono', monospace; font-size: 2em;   font-weight: 300; color: var(--value-color); display: block; }
    .time-value { font-family: 'IBM Plex Mono', monospace; font-size: 1.5em; font-weight: 300; color: var(--time-color);  display: block; }

    /* ── Settings ── */
    .settings-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px; padding: 18px; margin-top: 22px; }
    .settings-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.68em; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .current-params { font-family: 'IBM Plex Mono', monospace; font-size: 0.76em; color: var(--text-muted); margin-bottom: 16px; line-height: 1.8; }
    .saved-values { color: var(--accent); font-weight: 600; }

    .input-group { margin-bottom: 10px; }
    .input-group label { display: block; font-size: 0.68em; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 5px; }
    input[type=number] {
      width: 100%;
      padding: 11px 12px; /* збільшено для зручного тачу */
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-primary);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1em;
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: textfield;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number]:focus { border-color: var(--text-muted); }

    button {
      width: 100%;
      padding: 13px; /* більший тач-таргет */
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-light);
      border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 0.75em;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover  { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }
    button:active { background: var(--text-secondary); color: var(--bg); }

    .logout-link {
      display: inline-block;
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 0.75em;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-decoration: underline;
      text-align: center;
      width: 100%;
      padding: 6px 0; /* tap target */
      -webkit-tap-highlight-color: transparent;
    }

    .footer { margin-top: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 0.65em; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); text-align: center; }

    /* ── Mobile tweaks ── */
    @media (max-width: 400px) {
      .card { padding: 24px 18px 20px; }
      .value { font-size: 1.7em; }
      .time-value { font-size: 1.3em; }
    }
    /* центруємо картку вертикально лише якщо вона влазить у екран */
    @media (min-height: 750px) {
      body { justify-content: center; padding-top: max(20px, env(safe-area-inset-top)); }
    }
  </style>

  <script>
    // ==========================================
    // НАЛАШТУВАННЯ
    // ==========================================
    const FIREBASE_URL = "https://smartups-25ba9-default-rtdb.europe-west1.firebasedatabase.app/ups_1.json";
    const APP_PIN = "2026";
    const EFFICIENCY = 0.85;

    let sysCap   = parseFloat(localStorage.getItem('ups_cap'))   || 12000;
    let sysVolts = parseFloat(localStorage.getItem('ups_volts')) || 12.0;
    let sysAmps  = parseFloat(localStorage.getItem('ups_amps'))  || 1.0;

    // ── Локалізація ────────────────────────────────────────────
    const i18n = {
      uk: {
        access_title: '🔐 Доступ закрито',
        enter_btn:    'Увійти',
        wrong_pin:    'Невірний пароль!',
        title:        'Router UPS',
        connecting:   'Підключення...',
        offline:      'ПРИСТРІЙ ОФЛАЙН',
        status_on:    'Мережа: 220V (Зарядка)',
        status_bat:   'Увага: РОБОТА ВІД БАТАРЕЇ',
        voltage:      'Напруга АКБ',
        charge:       'Рівень заряду',
        runtime:      'Орієнтовний час роботи',
        charging:     'Заряджається...',
        runtime_fmt:  (h, m) => `~ ${h} год ${m} хв`,
        settings_title: '⚙ Калібрування розрахунку',
        cur_params:   'Поточні параметри:',
        cap_label:    'Загальна ємність АКБ (mAh)',
        volts_label:  'Робоча напруга пристроїв (V)',
        amps_label:   'Сумарний струм споживання (A)',
        cap_ph:       'Напр. 12000',
        volts_ph:     'Напр. 12',
        amps_ph:      'Напр. 1.2',
        save_btn:     'Зберегти в додатку',
        logout:       'Вийти з акаунта',
      },
      en: {
        access_title: '🔐 Access Restricted',
        enter_btn:    'Enter',
        wrong_pin:    'Wrong PIN!',
        title:        'Router UPS',
        connecting:   'Connecting...',
        offline:      'DEVICE OFFLINE',
        status_on:    'Grid: 220V (Charging)',
        status_bat:   'Warning: RUNNING ON BATTERY',
        voltage:      'Battery Voltage',
        charge:       'Charge Level',
        runtime:      'Estimated Runtime',
        charging:     'Charging...',
        runtime_fmt:  (h, m) => `~ ${h} h ${m} min`,
        settings_title: '⚙ Runtime Calibration',
        cur_params:   'Current parameters:',
        cap_label:    'Total Battery Capacity (mAh)',
        volts_label:  'Device Operating Voltage (V)',
        amps_label:   'Total Current Draw (A)',
        cap_ph:       'e.g. 12000',
        volts_ph:     'e.g. 12',
        amps_ph:      'e.g. 1.2',
        save_btn:     'Save to App',
        logout:       'Sign out',
      }
    };

    let lang = localStorage.getItem('ups_lang') || 'uk';

    function applyLang() {
      const t = i18n[lang];
      // login
      document.getElementById('accessTitle').innerText = t.access_title;
      document.getElementById('enterBtn').innerText    = t.enter_btn;
      // dashboard
      document.getElementById('title').innerText         = t.title;
      document.getElementById('labelVoltage').innerText  = t.voltage;
      document.getElementById('labelCharge').innerText   = t.charge;
      document.getElementById('labelRuntime').innerText  = t.runtime;
      document.getElementById('settingsTitle').innerText = t.settings_title;
      document.getElementById('curParamsLabel').innerText= t.cur_params;
      document.getElementById('capLabel').innerText      = t.cap_label;
      document.getElementById('voltsLabel').innerText    = t.volts_label;
      document.getElementById('ampsLabel').innerText     = t.amps_label;
      document.getElementById('capInput').placeholder    = t.cap_ph;
      document.getElementById('voltsInput').placeholder  = t.volts_ph;
      document.getElementById('ampsInput').placeholder   = t.amps_ph;
      document.getElementById('saveBtn').innerText       = t.save_btn;
      document.getElementById('logoutLink').innerText    = t.logout;

      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === lang)
      );
      document.documentElement.lang = lang;

      if (window._lastData) renderData(window._lastData);
      else {
        const badge = document.getElementById('status');
        if (badge) badge.innerText = t.connecting;
      }
    }

    function switchLang(l) {
      lang = l;
      localStorage.setItem('ups_lang', l);
      applyLang();
    }

    // ── Auth ──────────────────────────────────────────────────
    window.onload = function() {
      applyLang();
      if (localStorage.getItem('ups_auth') === 'true') {
        showDashboard();
      } else {
        document.getElementById('loginScreen').style.display = 'block';
      }
    };

    function checkPin() {
      if (document.getElementById('pinInput').value === APP_PIN) {
        localStorage.setItem('ups_auth', 'true');
        showDashboard();
      } else {
        alert(i18n[lang].wrong_pin);
        document.getElementById('pinInput').value = '';
      }
    }

    function handleKeyPress(e) { if (e.key === 'Enter') checkPin(); }

    function logout() {
      localStorage.removeItem('ups_auth');
      location.reload();
    }

    // ── Dashboard ─────────────────────────────────────────────
    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainDashboard').style.display = 'block';
      updateSettingsUI();
      fetchData();
      setInterval(fetchData, 2000);
    }

    function updateSettingsUI() {
      document.getElementById('currentCap').innerText   = sysCap;
      document.getElementById('currentVolts').innerText = sysVolts;
      document.getElementById('currentAmps').innerText  = sysAmps;
    }

    function saveSettings() {
      const c = document.getElementById('capInput').value;
      const v = document.getElementById('voltsInput').value;
      const a = document.getElementById('ampsInput').value;
      if (c) { sysCap   = parseFloat(c); localStorage.setItem('ups_cap',   sysCap);   }
      if (v) { sysVolts = parseFloat(v); localStorage.setItem('ups_volts', sysVolts); }
      if (a) { sysAmps  = parseFloat(a); localStorage.setItem('ups_amps',  sysAmps);  }
      document.getElementById('capInput').value   = '';
      document.getElementById('voltsInput').value = '';
      document.getElementById('ampsInput').value  = '';
      updateSettingsUI();
      fetchData();
    }

    function calculateRuntime(percentage) {
      let powerDrawW = sysVolts * sysAmps;
      if (powerDrawW <= 0) powerDrawW = 1.0;
      const totalEnergyWh   = (sysCap / 1000.0) * 3.7;
      const currentEnergyWh = totalEnergyWh * (percentage / 100.0);
      const totalMinutes    = Math.floor((currentEnergyWh / powerDrawW) * EFFICIENCY * 60);
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return i18n[lang].runtime_fmt(h, m);
    }

    function renderData(data) {
      const t = i18n[lang];
      const badge = document.getElementById('status');
      const dot   = document.getElementById('headerDot');
      const now   = Date.now();

      if ((now - data.last_update) > 15000) {
        badge.innerText   = t.offline;
        badge.className   = 'status-badge offline';
        dot.className     = 'header-dot dot-offline';
        document.getElementById('volts').innerText   = '-- V';
        document.getElementById('perc').innerText    = '-- %';
        document.getElementById('runtime').innerText = '--';
      } else {
        document.getElementById('volts').innerText = data.voltage.toFixed(2) + ' V';
        document.getElementById('perc').innerText  = data.percentage + ' %';

        if (data.mains_online) {
          badge.innerText = t.status_on;
          badge.className = 'status-badge online';
          dot.className   = 'header-dot dot-online';
          document.getElementById('runtime').innerText = t.charging;
        } else {
          badge.innerText = t.status_bat;
          badge.className = 'status-badge battery';
          dot.className   = 'header-dot dot-battery';
          document.getElementById('runtime').innerText = calculateRuntime(data.percentage);
        }
      }
    }

    function fetchData() {
      fetch(FIREBASE_URL)
        .then(r => r.json())
        .then(data => {
          if (!data) return;
          window._lastData = data;
          renderData(data);
        })
        .catch(err => console.log('Fetch error', err));
    }
  </script>
</head>
<body>

  <!-- Language switcher -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="uk" onclick="switchLang('uk')">УКР</button>
    <button class="lang-btn"        data-lang="en" onclick="switchLang('en')">ENG</button>
  </div>

  <!-- Login -->
  <div class="card" id="loginScreen" style="display:none;">
    <h2 id="accessTitle">🔐 Доступ закрито</h2>
    <input type="password" id="pinInput" class="pin-input" placeholder="••••" onkeypress="handleKeyPress(event)" autocomplete="current-password">
    <button id="enterBtn" onclick="checkPin()">Увійти</button>
  </div>

  <!-- Dashboard -->
  <div class="card" id="mainDashboard">
    <div class="header">
      <h1 id="title">Router UPS</h1>
      <div class="header-dot dot-offline" id="headerDot"></div>
    </div>

    <div id="status" class="status-badge offline">Підключення...</div>

    <div class="data-row">
      <div class="data-label" id="labelVoltage">Напруга АКБ</div>
      <span id="volts" class="value">-- V</span>
    </div>
    <div class="data-row">
      <div class="data-label" id="labelCharge">Рівень заряду</div>
      <span id="perc" class="value">-- %</span>
    </div>
    <div class="data-row">
      <div class="data-label" id="labelRuntime">Орієнтовний час роботи</div>
      <span id="runtime" class="time-value">--</span>
    </div>

    <div class="settings-box">
      <div class="settings-title" id="settingsTitle">⚙ Калібрування розрахунку</div>
      <div class="current-params">
        <span id="curParamsLabel">Поточні параметри:</span><br>
        <span class="saved-values"><span id="currentCap">--</span> mAh</span> &nbsp;|&nbsp;
        <span class="saved-values"><span id="currentVolts">--</span> V</span> &nbsp;|&nbsp;
        <span class="saved-values"><span id="currentAmps">--</span> A</span>
      </div>
      <div class="input-group">
        <label id="capLabel">Загальна ємність АКБ (mAh)</label>
        <input type="number" id="capInput" placeholder="Напр. 12000" inputmode="numeric">
      </div>
      <div class="input-group">
        <label id="voltsLabel">Робоча напруга пристроїв (V)</label>
        <input type="number" id="voltsInput" placeholder="Напр. 12" step="0.1" inputmode="decimal">
      </div>
      <div class="input-group">
        <label id="ampsLabel">Сумарний струм споживання (A)</label>
        <input type="number" id="ampsInput" placeholder="Напр. 1.2" step="0.1" inputmode="decimal">
      </div>
      <button id="saveBtn" onclick="saveSettings()">Зберегти в додатку</button>
    </div>

    <span class="logout-link" id="logoutLink" onclick="logout()">Вийти з акаунта</span>

    <div class="footer">MAERES</div>
  </div>

</body>
</html>
