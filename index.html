<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>Smart UPS Dashboard</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: #2a2a2a;
      --border-light: #333333;
      --text-primary: #e8e8e8;
      --text-secondary: #888888;
      --text-muted: #444444;
      --accent: #00bcd4;
      --online: #3a3a3a;
      --battery: #2a1a1a;
      --offline: #1a1a1a;
      --battery-border: #5a2a2a;
      --online-border: #3a5a3a;
      --value-color: #ffffff;
      --time-color: #aaaaaa;
    }

    body { font-family: 'IBM Plex Sans', sans-serif; background-color: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 36px 32px 28px; width: 100%; max-width: 400px; }
    
    /* --- СТИЛІ ЕКРАНУ ВХОДУ --- */
    #loginScreen { text-align: center; }
    #loginScreen h2 { margin-bottom: 20px; font-family: 'IBM Plex Mono', monospace; font-weight: 400; color: var(--text-secondary); }
    .pin-input { width: 100%; padding: 15px; font-size: 1.5em; text-align: center; letter-spacing: 0.2em; background: var(--bg); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px; outline: none; margin-bottom: 20px; font-family: 'IBM Plex Mono', monospace; }
    .pin-input:focus { border-color: var(--accent); }
    
    /* --- СТИЛІ ДАШБОРДА --- */
    #mainDashboard { display: none; /* Приховано за замовчуванням */ }
    
    .header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 28px; }
    h1 { font-family: 'IBM Plex Mono', monospace; font-size: 1.05em; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    .header-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); margin-left: auto; transition: background 0.4s; flex-shrink: 0; }
    .dot-online { background: #5a8a5a; box-shadow: 0 0 6px #5a8a5a88; }
    .dot-battery { background: #8a3a3a; box-shadow: 0 0 6px #8a3a3a88; }
    .dot-offline { background: #555555; }

    .status-badge { font-family: 'IBM Plex Mono', monospace; font-size: 0.7em; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 12px; border-radius: 3px; margin-bottom: 24px; border: 1px solid var(--border); color: var(--text-secondary); background: var(--surface-2); text-align: center; }
    .status-badge.online { background: var(--online); border-color: var(--online-border); color: #8aba8a; }
    .status-badge.battery { background: var(--battery); border-color: var(--battery-border); color: #ba6a6a; }

    .data-row { margin: 0 0 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .data-row:last-of-type { border-bottom: none; margin-bottom: 0; }
    .data-label { font-size: 0.72em; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px; }
    .value { font-family: 'IBM Plex Mono', monospace; font-size: 2em; font-weight: 300; color: var(--value-color); display: block; }
    .time-value { font-family: 'IBM Plex Mono', monospace; font-size: 1.5em; font-weight: 300; color: var(--time-color); display: block; }

    .settings-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px; padding: 20px; margin-top: 24px; }
    .settings-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.68em; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .current-params { font-family: 'IBM Plex Mono', monospace; font-size: 0.78em; color: var(--text-muted); margin-bottom: 18px; line-height: 1.8; }
    .saved-values { color: var(--accent); font-weight: 600; }
    
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 0.68em; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 5px; }
    input[type=number] { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text-primary); font-family: 'IBM Plex Mono', monospace; font-size: 0.9em; outline: none; }
    
    button { width: 100%; padding: 12px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-light); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 0.75em; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; margin-top: 6px; transition: all 0.15s; }
    button:hover { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

    .footer { margin-top: 28px; font-family: 'IBM Plex Mono', monospace; font-size: 0.65em; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); text-align: center; }
  </style>

  <script>
    // ==========================================
    // НАЛАШТУВАННЯ ДОДАТКУ
    // ==========================================
    const FIREBASE_URL = "https://smartups-25ba9-default-rtdb.europe-west1.firebasedatabase.app/ups_1.json";
    
    // ТУТ ВСТАНОВЛЮЄТЬСЯ ТВІЙ ПАРОЛЬ
    const APP_PIN = "2026"; 

    let sysCap = parseFloat(localStorage.getItem('ups_cap')) || 12000;
    let sysVolts = parseFloat(localStorage.getItem('ups_volts')) || 12.0;
    let sysAmps = parseFloat(localStorage.getItem('ups_amps')) || 1.0;
    const EFFICIENCY = 0.85;

    // --- ЛОГІКА АВТОРИЗАЦІЇ ---
    window.onload = function() {
      // Перевіряємо, чи користувач вже вводив пароль раніше
      if (localStorage.getItem('ups_auth') === 'true') {
        showDashboard();
      } else {
        document.getElementById('loginScreen').style.display = 'block';
      }
    };

    function checkPin() {
      let enteredPin = document.getElementById('pinInput').value;
      if (enteredPin === APP_PIN) {
        localStorage.setItem('ups_auth', 'true'); // Запам'ятовуємо успішний вхід
        showDashboard();
      } else {
        alert("Невірний пароль!");
        document.getElementById('pinInput').value = '';
      }
    }

    // Дозволяємо натискати Enter для входу
    function handleKeyPress(e) {
      if(e.key === 'Enter') checkPin();
    }

    // --- ЛОГІКА ДАШБОРДА ---
    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainDashboard').style.display = 'block';
      updateSettingsUI();
      fetchData();
      setInterval(fetchData, 2000); 
    }

    function updateSettingsUI() {
      document.getElementById('currentCap').innerText = sysCap;
      document.getElementById('currentVolts').innerText = sysVolts;
      document.getElementById('currentAmps').innerText = sysAmps;
    }

    function saveSettings() {
      let c = document.getElementById('capInput').value;
      let v = document.getElementById('voltsInput').value;
      let a = document.getElementById('ampsInput').value;

      if(c) { sysCap = parseFloat(c); localStorage.setItem('ups_cap', sysCap); }
      if(v) { sysVolts = parseFloat(v); localStorage.setItem('ups_volts', sysVolts); }
      if(a) { sysAmps = parseFloat(a); localStorage.setItem('ups_amps', sysAmps); }

      document.getElementById('capInput').value = '';
      document.getElementById('voltsInput').value = '';
      document.getElementById('ampsInput').value = '';
      
      updateSettingsUI();
      fetchData(); 
    }

    function calculateRuntime(percentage) {
      let powerDrawW = sysVolts * sysAmps;
      if (powerDrawW <= 0) powerDrawW = 1.0;
      
      let totalEnergyWh = (sysCap / 1000.0) * 3.7; 
      let currentEnergyWh = totalEnergyWh * (percentage / 100.0);
      let realRuntimeHours = (currentEnergyWh / powerDrawW) * EFFICIENCY;
      
      let totalMinutes = Math.floor(realRuntimeHours * 60);
      let h = Math.floor(totalMinutes / 60);
      let m = totalMinutes % 60;
      
      return `~ ${h} год ${m} хв`;
    }

    function fetchData() {
      fetch(FIREBASE_URL)
        .then(response => response.json())
        .then(data => {
          if (!data) return;

          let now = Date.now();
          let isOffline = (now - data.last_update) > 15000;

          const statusBadge = document.getElementById('status');
          const dot = document.getElementById('headerDot');
          
          if (isOffline) {
            statusBadge.innerText = 'ПРИСТРІЙ ОФЛАЙН';
            statusBadge.className = 'status-badge offline';
            dot.className = 'header-dot dot-offline';
            document.getElementById('volts').innerText = '-- V';
            document.getElementById('perc').innerText = '-- %';
            document.getElementById('runtime').innerText = '--';
          } else {
            document.getElementById('volts').innerText = data.voltage.toFixed(2) + ' V';
            document.getElementById('perc').innerText = data.percentage + ' %';
            
            if (data.mains_online) {
              statusBadge.innerText = 'Мережа: 220V (Зарядка)';
              statusBadge.className = 'status-badge online';
              dot.className = 'header-dot dot-online';
              document.getElementById('runtime').innerText = 'Заряджається...';
            } else {
              statusBadge.innerText = 'Увага: РОБОТА ВІД БАТАРЕЇ';
              statusBadge.className = 'status-badge battery';
              dot.className = 'header-dot dot-battery';
              document.getElementById('runtime').innerText = calculateRuntime(data.percentage);
            }
          }
        })
        .catch(err => console.log("Помилка", err));
    }
    
    function logout() {
        localStorage.removeItem('ups_auth');
        location.reload();
    }
  </script>
</head>
<body>

  <div class="card" id="loginScreen" style="display: none;">
    <h2>🔐 Доступ закрито</h2>
    <input type="password" id="pinInput" class="pin-input" placeholder="••••" onkeypress="handleKeyPress(event)">
    <button onclick="checkPin()">Увійти</button>
  </div>

  <div class="card" id="mainDashboard">
    <div class="header">
      <h1 id="title">Router UPS</h1>
      <div class="header-dot dot-offline" id="headerDot"></div>
    </div>

    <div id="status" class="status-badge offline">Підключення...</div>

    <div class="data-row">
      <div class="data-label">Напруга АКБ</div>
      <span id="volts" class="value">-- V</span>
    </div>

    <div class="data-row">
      <div class="data-label">Рівень заряду</div>
      <span id="perc" class="value">-- %</span>
    </div>

    <div class="data-row">
      <div class="data-label">Орієнтовний час роботи</div>
      <span id="runtime" class="time-value">--</span>
    </div>

    <div class="settings-box">
      <div class="settings-title">⚙ Калібрування розрахунку</div>
      <div class="current-params">
        Поточні параметри:<br>
        <span class="saved-values"><span id="currentCap">--</span> mAh</span> &nbsp;|&nbsp;
        <span class="saved-values"><span id="currentVolts">--</span> V</span> &nbsp;|&nbsp;
        <span class="saved-values"><span id="currentAmps">--</span> A</span>
      </div>

      <div class="input-group">
        <label>Загальна ємність АКБ (mAh)</label>
        <input type="number" id="capInput" placeholder="Напр. 12000">
      </div>
      <div class="input-group">
        <label>Робоча напруга пристроїв (V)</label>
        <input type="number" id="voltsInput" placeholder="Напр. 12" step="0.1">
      </div>
      <div class="input-group">
        <label>Сумарний струм споживання (A)</label>
        <input type="number" id="ampsInput" placeholder="Напр. 1.2" step="0.1">
      </div>

      <button onclick="saveSettings()">Зберегти в додатку</button>
    </div>

    <div style="margin-top: 15px; text-align: center;">
        <span onclick="logout()" style="color: #444; font-size: 0.8em; cursor: pointer; text-decoration: underline;">Вийти з акаунта</span>
    </div>

    <div class="footer">Розроблено Льошею 🛠️</div>
  </div>

</body>
</html>
